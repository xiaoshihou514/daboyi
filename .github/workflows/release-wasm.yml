name: Build and Deploy to GitHub Pages

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install mold
        uses: rui314/setup-mold@v1

      - name: Setup wasm-bindgen
        uses: taiki-e/install-action@v2
        with:
          tool: wasm-bindgen@0.2.113

      - name: Setup Trunk
        uses: taiki-e/install-action@v2
        with:
          tool: trunk

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Download and extract EU5toGIS dataset
        run: |
          wget "https://github.com/xiaoshihou514/daboyi/releases/download/v1.0.0/shujvji.zip"
          unzip shujvji.zip -d /home/runner/work/daboyi/
          ls -la /home/runner/work/daboyi/EU5toGIS/
          echo "Downloaded and extracted EU5toGIS dataset"

      - name: Generate map assets
        run: |
          export EU5TOGIS_DIR="/home/runner/work/daboyi/EU5toGIS"
          cargo run --release -p mapgen
          ls -la assets/*.bin
          echo "Generated map assets"

      - name: Generate rivers data
        run: |
          cd tools
          uv run extract_rivers_vector.py
          cd ..
          ls -la assets/rivers.bin
          echo "Generated rivers data"

      - name: Generate terrain adjacency cache
        run: |
          cargo run --release -p terrain_cache
          ls -la assets/terrain_adjacency.bin
          echo "Generated terrain adjacency cache"

      - name: Copy all assets to web/dist
        run: |
          mkdir -p web/dist/assets
          cp -rf assets/* web/dist/assets/
          ls -la web/dist/assets/
          echo "Copied all assets to web/dist/assets/"

      - name: Build web assets with Trunk
        run: trunk build --release --config web/Trunk.toml

      - name: Build wasm bundle
        run: |
          cargo build --target wasm32-unknown-unknown --release -p client
          wasm-bindgen --out-dir ./web/dist --target web target/wasm32-unknown-unknown/release/client.wasm
          ls -aR web/dist

      - name: Upload to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist
      - name: Deploy to Github Pages
        uses: actions/deploy-pages@v4
